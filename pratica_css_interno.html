<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Aula CSS - 1</title>
</head>

<style>
	p {
		font-size: 15px;
	}

	.card {
		width: 500px;
		height: fit-content;
		background-color: aliceblue;
		border: solid 2px navy;
		margin: 20px;
		padding: 40px;
	}

	.border {
		border-radius: 20px;
	}

	.icone {
		width: 100px;
		height: 100px;
		border-radius: 25px;
		background-size: cover;
	}

	.icone1 {
		background-image: url('https://cdn-icons-png.flaticon.com/512/706/706830.png');
	}

	.icone2 {
		background-image: url('https://cdn-icons-png.flaticon.com/256/3681/3681928.png');
	}

	.text {
		font-family: Arial, Helvetica, sans-serif;
	}

	.title {
		font-size: 30px;
	}

	.main-color {
		color: navy;
	}
	
	.italic {
		font-style: italic;
	}

</style>

<body>
	<div class="card border">

		<div class="icone icone1 border"></div>

		<div>
			<h1 class="text title">
				Meu nome é: <span class="main-color">Adriana</span>
			</h1>

			<p class="text">
				Mensagem: <span class="main-color italic">A vida não é um morango!</span>
			</p>
		</div>
	</div>

	<div class="card border">

		<div class="icone icone2 border"></div>

		<div>
			<h1 class="text title">
				Meu nome é: <span style="color: navy">Hugo</span>
			</h1>

			<p class="text">
				Mensagem: <span style="color: navy; font-style: italic;">Um dia é da caça, o outro é do caçador.</span>
			</p>
		</div>
	</div>

</body>

</html>
